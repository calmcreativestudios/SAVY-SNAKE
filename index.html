<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Savy Snake Module</title>

  <style>
    :root{
      --bg: transparent;
      --ink:#000000;
      --screen:#79965E;
      --gameSize:900px;
    }

    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:transparent;
      overflow:hidden;
      overscroll-behavior:none;
      font-family:Arial, Helvetica, sans-serif;
    }

    #stage{
      position:fixed;
      left:0;
      top:0;
      transform-origin:0 0;
      will-change:transform;
    }

    #savySnakeModule{
      width:var(--gameSize);
      height:var(--gameSize);
      position:relative;
      background:transparent;
    }

    .gameBox{
      width:var(--gameSize);
      height:var(--gameSize);
      background:transparent;
      box-sizing:border-box;
      position:relative;
      overflow:hidden;
    }

    canvas{
      width:100%;
      height:100%;
      display:block;
      background:transparent;
      image-rendering:pixelated;
      touch-action:none;
      pointer-events:none;
    }

    #bootScreen{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      z-index:5;
      animation:savyBoot 1s steps(2,end) forwards;
      pointer-events:none;
    }

    #bootScreen img{
      width:45%;
      height:auto;
      display:block;
      filter:brightness(0);
    }

    #bootFallback{
      font-size:72px;
      font-weight:900;
      letter-spacing:2px;
      color:#000;
      display:none;
    }

    @keyframes savyBoot{
      0%{opacity:0;}
      20%{opacity:1;}
      70%{opacity:1;}
      85%{opacity:.35;}
      100%{opacity:0; visibility:hidden;}
    }
  </style>
</head>

<body>

  <div id="stage">
    <div id="savySnakeModule">
      <div class="gameBox" aria-label="Savy Snake game">
        <canvas id="game" width="900" height="900"></canvas>

        <div id="bootScreen">
          <img src="./savy-logo.svg" alt="SAVY" onerror="this.style.display='none';document.getElementById('bootFallback').style.display='block';">
          <div id="bootFallback">SAVY</div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const GRID = 28;
  const START_MS = 90;
  const MIN_MS = 55;
  const SPEEDUP_EVERY = 4;
  const SPEEDUP_MS = 4;

  const LOGO_SRC = "./savy-logo.svg";

  const EAT_SFX_SRC = "./eat.mp3";
  const START_SFX_SRC = "./START.mp3";
  const LOSE_SFX_SRC  = "./LOSE.mp3";

  const eatSfx = new Audio(EAT_SFX_SRC);
  const startSfx = new Audio(START_SFX_SRC);
  const loseSfx  = new Audio(LOSE_SFX_SRC);

  [eatSfx,startSfx,loseSfx].forEach(a => {
    a.preload = "auto";
    a.volume = 0.5;
  });

  let soundOn = true;
  let audioArmed = false;

  function armAudioOnce(){
    if (audioArmed) return;
    audioArmed = true;

    try {
      eatSfx.muted = true;
      const p = eatSfx.play();

      if (p && typeof p.then === "function") {
        p.then(() => {
          eatSfx.pause();
          eatSfx.currentTime = 0;
          eatSfx.muted = false;
        }).catch(() => {
          eatSfx.muted = false;
        });
      }
    } catch(e) {}
  }

  function playSfx(a){
    if (!soundOn) return;
    try{
      a.currentTime = 0;
      const p = a.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    } catch(e) {}
  }

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha:true });

  let snake = [];
  let dir = {x:1, y:0};
  let nextDir = {x:1, y:0};
  let food = {x:10, y:10};
  let score = 0;

  let tickMs = START_MS;
  let lastTime = 0;
  let acc = 0;
  let running = false;
  let paused = false;
  let dead = false;
  let booting = true;

  setTimeout(() => {
    booting = false;
    reset();
  }, 1000);

  function fitStage(){
    const stage = document.getElementById("stage");
    const module = document.getElementById("savySnakeModule");

    const baseW = module.offsetWidth;
    const baseH = module.offsetHeight;

    stage.style.width = baseW + "px";
    stage.style.height = baseH + "px";

    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const scale = Math.min(vw / baseW, vh / baseH);

    stage.style.transform = `scale(${scale})`;
    stage.style.left = Math.floor((vw - baseW * scale) / 2) + "px";
    stage.style.top  = Math.floor((vh - baseH * scale) / 2) + "px";
  }

  function resizeCanvasToBox(){
    const boxEl = canvas.parentElement;
    const cssW = boxEl.clientWidth;
    const cssH = boxEl.clientHeight;

    const dpr = window.devicePixelRatio || 1;
    const px = Math.floor(cssW * dpr * 2);
    const py = Math.floor(cssH * dpr * 2);

    if (canvas.width !== px || canvas.height !== py){
      canvas.width = px;
      canvas.height = py;
      ctx.imageSmoothingEnabled = false;
    }
  }

  window.addEventListener("resize", () => {
    fitStage();
    resizeCanvasToBox();
  });

  function cellSize(){
    return Math.floor(Math.min(canvas.width, canvas.height) / GRID);
  }

  function reset(){
    score = 0;
    tickMs = START_MS;
    dead = false;
    paused = false;
    running = true;
    lastTime = 0;
    acc = 0;

    const mid = Math.floor(GRID / 2);

    snake = [
      {x:mid, y:mid},
      {x:mid - 1, y:mid},
      {x:mid - 2, y:mid},
      {x:mid - 3, y:mid},
    ];

    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    food = spawnFood();

    playSfx(startSfx);
  }

  function spawnFood(){
    for (let i = 0; i < 1200; i++){
      const x = Math.floor(Math.random() * GRID);
      const y = Math.floor(Math.random() * GRID);
      if (!snake.some(s => s.x === x && s.y === y)) return {x,y};
    }
    return {x:0, y:0};
  }

  function step(){
    if (dead || paused || booting) return;

    dir = nextDir;

    const head = snake[0];
    const nx = head.x + dir.x;
    const ny = head.y + dir.y;

    if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID){
      dead = true;
      running = false;
      playSfx(loseSfx);
      return;
    }

    if (snake.some((s, idx) => idx !== 0 && s.x === nx && s.y === ny)){
      dead = true;
      running = false;
      playSfx(loseSfx);
      return;
    }

    snake.unshift({x:nx, y:ny});

    if (nx === food.x && ny === food.y){
      score += 1;
      playSfx(eatSfx);

      if (score % SPEEDUP_EVERY === 0){
        tickMs = Math.max(MIN_MS, tickMs - SPEEDUP_MS);
      }

      food = spawnFood();
    } else {
      snake.pop();
    }
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (booting) return;

    const cs = cellSize();
    const ox = Math.floor((canvas.width - cs * GRID) / 2);
    const oy = Math.floor((canvas.height - cs * GRID) / 2);

    ctx.save();
    ctx.translate(ox, oy);

    ctx.strokeStyle = "#000";
    ctx.lineWidth = Math.max(8, cs * 0.22);

    ctx.strokeRect(
      cs * 0.1,
      cs * 0.1,
      cs * GRID - (cs * 0.2),
      cs * GRID - (cs * 0.2)
    );

    ctx.fillStyle = "#000";

    for (let i = 0; i < snake.length; i++){
      const s = snake[i];
      ctx.fillRect(s.x * cs + 1, s.y * cs + 1, cs - 2, cs - 2);
    }

    const fx = food.x * cs;
    const fy = food.y * cs;

    ctx.fillStyle = "#000";
    ctx.fillRect(fx + cs * 0.25, fy + cs * 0.25, cs * 0.5, cs * 0.5);

    ctx.restore();

    if (paused && !dead){
      drawCentreText("PAUSED", 0);
    }

    if (dead){
      drawGameOver();
    }
  }

  function drawCentreText(text, offsetY){
    ctx.save();
    ctx.fillStyle = "#000";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `${Math.floor(canvas.width * 0.065)}px Arial Black, Arial, sans-serif`;
    ctx.fillText(text, canvas.width / 2, canvas.height / 2 + offsetY);
    ctx.restore();
  }

  function drawGameOver(){
    ctx.save();

    ctx.fillStyle = "#000";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.font = `${Math.floor(canvas.width * 0.06)}px Arial Black, Arial, sans-serif`;
    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height * 0.42);

    ctx.font = `${Math.floor(canvas.width * 0.04)}px Arial Black, Arial, sans-serif`;
    ctx.fillText(`SCORE: ${String(score).padStart(2, "0")}`, canvas.width / 2, canvas.height * 0.52);

    ctx.font = `${Math.floor(canvas.width * 0.027)}px Arial, sans-serif`;
    ctx.fillText("PRESS RESTART", canvas.width / 2, canvas.height * 0.62);

    ctx.restore();
  }

  function loop(t){
    if (!lastTime) lastTime = t;

    const dt = t - lastTime;
    lastTime = t;

    if (running && !dead && !paused){
      acc += dt;
      while (acc >= tickMs){
        step();
        acc -= tickMs;
      }
    }

    draw();
    requestAnimationFrame(loop);
  }

  function setDirection(dx, dy){
    armAudioOnce();
    if (dead || paused || booting) return;
    if (dx === -dir.x && dy === -dir.y) return;
    nextDir = {x:dx, y:dy};
  }

  function togglePause(){
    armAudioOnce();
    if (dead || booting) return;
    paused = !paused;
  }

  function restartGame(){
    armAudioOnce();
    booting = false;
    reset();
  }

  function toggleSound(){
    armAudioOnce();
    soundOn = !soundOn;
    return soundOn;
  }

  window.SavySnake = {
    up: () => setDirection(0,-1),
    down: () => setDirection(0,1),
    left: () => setDirection(-1,0),
    right: () => setDirection(1,0),
    pause: () => togglePause(),
    restart: () => restartGame(),
    sound: () => toggleSound(),
    getScore: () => score,
    isSoundOn: () => soundOn
  };

  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();

    if (["arrowup","arrowdown","arrowleft","arrowright"," ","r","m"].includes(k)){
      e.preventDefault();
      e.stopPropagation();
    }

    if (k === "arrowup" || k === "w") window.SavySnake.up();
    else if (k === "arrowdown" || k === "s") window.SavySnake.down();
    else if (k === "arrowleft" || k === "a") window.SavySnake.left();
    else if (k === "arrowright" || k === "d") window.SavySnake.right();
    else if (k === " ") window.SavySnake.pause();
    else if (k === "r") window.SavySnake.restart();
    else if (k === "m") window.SavySnake.sound();
  }, { passive:false });

  function init(){
    fitStage();
    resizeCanvasToBox();

    requestAnimationFrame(() => {
      fitStage();
      resizeCanvasToBox();
    });

    requestAnimationFrame(loop);
  }

  if (document.readyState === "loading"){
    window.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
