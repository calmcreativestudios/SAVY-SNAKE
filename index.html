<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Savy Snake Module</title>

  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:transparent;
      overflow:hidden;
      font-family:Arial, Helvetica, sans-serif;
    }

    #stage{
      width:100%;
      height:100%;
      position:relative;
      background:transparent;
      overflow:hidden;
    }

    #savySnakeModule{
      width:100%;
      height:100%;
      position:relative;
      background:transparent;
      overflow:hidden;
    }

    .gameBox{
      width:100%;
      height:100%;
      position:relative;
      background:transparent;
      overflow:hidden;
    }

    canvas{
      width:100%;
      height:100%;
      display:block;
      background:transparent;
      image-rendering:pixelated;
      touch-action:none;
      pointer-events:none;
    }

    #bootScreen{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      z-index:5;
      animation:savyBoot 1s steps(2,end) forwards;
      pointer-events:none;
    }

    #bootLogo{
      width:45%;
      height:auto;
      display:none;
      filter:brightness(0);
    }

    #bootFallback{
      font-size:58px;
      font-weight:900;
      letter-spacing:2px;
      color:#000;
      display:block;
    }

    @keyframes savyBoot{
      0%{opacity:0;}
      20%{opacity:1;}
      70%{opacity:1;}
      85%{opacity:.35;}
      100%{opacity:0; visibility:hidden;}
    }
  </style>
</head>

<body>

  <div id="stage">
    <div id="savySnakeModule">
      <div class="gameBox">
        <canvas id="game"></canvas>

        <div id="bootScreen">
          <img id="bootLogo" alt="SAVY">
          <div id="bootFallback">SAVY</div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const GRID = 28;
  const START_MS = 90;
  const MIN_MS = 55;
  const SPEEDUP_EVERY = 4;
  const SPEEDUP_MS = 4;

  const BOOT_LOGO_URL = "";
  const EAT_SFX_SRC = "./eat.mp3";
  const START_SFX_SRC = "./START.mp3";
  const LOSE_SFX_SRC  = "./LOSE.mp3";

  const eatSfx = new Audio(EAT_SFX_SRC);
  const startSfx = new Audio(START_SFX_SRC);
  const loseSfx  = new Audio(LOSE_SFX_SRC);

  [eatSfx,startSfx,loseSfx].forEach(a => {
    a.preload = "auto";
    a.volume = 0.5;
  });

  let soundOn = true;
  let audioArmed = false;

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha:true });

  const bootLogo = document.getElementById("bootLogo");
  const bootFallback = document.getElementById("bootFallback");

  if (BOOT_LOGO_URL){
    bootLogo.src = BOOT_LOGO_URL;
    bootLogo.onload = () => {
      bootLogo.style.display = "block";
      bootFallback.style.display = "none";
    };
  }

  let snake = [];
  let dir = {x:1, y:0};
  let nextDir = {x:1, y:0};
  let food = {x:10, y:10};
  let score = 0;

  let tickMs = START_MS;
  let lastTime = 0;
  let acc = 0;
  let running = false;
  let paused = false;
  let dead = false;
  let booting = true;

  function armAudioOnce(){
    if (audioArmed) return;
    audioArmed = true;

    try {
      eatSfx.muted = true;
      const p = eatSfx.play();

      if (p && typeof p.then === "function") {
        p.then(() => {
          eatSfx.pause();
          eatSfx.currentTime = 0;
          eatSfx.muted = false;
        }).catch(() => {
          eatSfx.muted = false;
        });
      }
    } catch(e) {}
  }

  function playSfx(a){
    if (!soundOn) return;
    try{
      a.currentTime = 0;
      const p = a.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    } catch(e) {}
  }

  function resizeCanvasToBox(){
    const boxEl = canvas.parentElement;
    const cssW = boxEl.clientWidth;
    const cssH = boxEl.clientHeight;
    const dpr = window.devicePixelRatio || 1;

    const px = Math.max(2, Math.floor(cssW * dpr * 2));
    const py = Math.max(2, Math.floor(cssH * dpr * 2));

    if (canvas.width !== px || canvas.height !== py){
      canvas.width = px;
      canvas.height = py;
      ctx.imageSmoothingEnabled = false;
    }
  }

  window.addEventListener("resize", resizeCanvasToBox);

  function cellSize(){
    return Math.floor(Math.min(canvas.width, canvas.height) / GRID);
  }

  function reset(){
    score = 0;
    tickMs = START_MS;
    dead = false;
    paused = false;
    running = true;
    lastTime = 0;
    acc = 0;

    const mid = Math.floor(GRID / 2);

    snake = [
      {x:mid, y:mid},
      {x:mid - 1, y:mid},
      {x:mid - 2, y:mid},
      {x:mid - 3, y:mid},
    ];

    dir = {x:1, y:0};
    nextDir = {x:1, y:0};
    food = spawnFood();

    playSfx(startSfx);
  }

  function spawnFood(){
    for (let i = 0; i < 1200; i++){
      const x = Math.floor(Math.random() * GRID);
      const y = Math.floor(Math.random() * GRID);
      if (!snake.some(s => s.x === x && s.y === y)) return {x,y};
    }
    return {x:0, y:0};
  }

  function step(){
    if (dead || paused || booting) return;

    dir = nextDir;

    const head = snake[0];
    const nx = head.x + dir.x;
    const ny = head.y + dir.y;

    if (nx < 0 || ny < 0 || nx >= GRID || ny >= GRID){
      dead = true;
      running = false;
      playSfx(loseSfx);
      return;
    }

    if (snake.some((s, idx) => idx !== 0 && s.x === nx && s.y === ny)){
      dead = true;
      running = false;
      playSfx(loseSfx);
      return;
    }

    snake.unshift({x:nx, y:ny});

    if (nx === food.x && ny === food.y){
      score += 1;
      playSfx(eatSfx);

      if (score % SPEEDUP_EVERY === 0){
        tickMs = Math.max(MIN_MS, tickMs - SPEEDUP_MS);
      }

      food = spawnFood();
    } else {
      snake.pop();
    }
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (booting) return;

    const cs = cellSize();
    const playW = cs * GRID;
    const playH = cs * GRID;

    const ox = Math.floor((canvas.width - playW) / 2);
    const oy = Math.floor((canvas.height - playH) / 2);

    ctx.save();
    ctx.translate(ox, oy);

    ctx.strokeStyle = "#000";
    ctx.lineWidth = Math.max(8, cs * 0.22);

    ctx.strokeRect(
      cs * 0.1,
      cs * 0.1,
      playW - (cs * 0.2),
      playH - (cs * 0.2)
    );

    ctx.fillStyle = "#000";

    for (let i = 0; i < snake.length; i++){
      const s = snake[i];
      ctx.fillRect(s.x * cs + 1, s.y * cs + 1, cs - 2, cs - 2);
    }

    const fx = food.x * cs;
    const fy = food.y * cs;

    ctx.fillRect(fx + cs * 0.25, fy + cs * 0.25, cs * 0.5, cs * 0.5);

    ctx.restore();

    if (paused && !dead){
      drawCentreText("PAUSED", 0);
    }

    if (dead){
      drawGameOver();
    }
  }

  function drawCentreText(text, offsetY){
    ctx.save();
    ctx.fillStyle = "#000";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = `${Math.floor(canvas.width * 0.065)}px Arial Black, Arial, sans-serif`;
    ctx.fillText(text, canvas.width / 2, canvas.height / 2 + offsetY);
    ctx.restore();
  }

  function drawGameOver(){
    ctx.save();

    ctx.fillStyle = "#000";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    ctx.font = `${Math.floor(canvas.width * 0.06)}px Arial Black, Arial, sans-serif`;
    ctx.fillText("GAME OVER", canvas.width / 2, canvas.height * 0.42);

    ctx.font = `${Math.floor(canvas.width * 0.04)}px Arial Black, Arial, sans-serif`;
    ctx.fillText(`SCORE: ${String(score).padStart(2, "0")}`, canvas.width / 2, canvas.height * 0.52);

    ctx.font = `${Math.floor(canvas.width * 0.027)}px Arial, sans-serif`;
    ctx.fillText("PRESS RESTART", canvas.width / 2, canvas.height * 0.62);

    ctx.restore();
  }

  function loop(t){
    if (!lastTime) lastTime = t;

    const dt = t - lastTime;
    lastTime = t;

    if (running && !dead && !paused){
      acc += dt;
      while (acc >= tickMs){
        step();
        acc -= tickMs;
      }
    }

    draw();
    requestAnimationFrame(loop);
  }

  function setDirection(dx, dy){
    armAudioOnce();
    if (dead || paused || booting) return;
    if (dx === -dir.x && dy === -dir.y) return;
    nextDir = {x:dx, y:dy};
  }

  function togglePause(){
    armAudioOnce();
    if (dead || booting) return;
    paused = !paused;
  }

  function restartGame(){
    armAudioOnce();
    booting = false;
    reset();
  }

  function toggleSound(){
    armAudioOnce();
    soundOn = !soundOn;
    return soundOn;
  }

  window.SavySnake = {
    up: () => setDirection(0,-1),
    down: () => setDirection(0,1),
    left: () => setDirection(-1,0),
    right: () => setDirection(1,0),
    pause: () => togglePause(),
    restart: () => restartGame(),
    sound: () => toggleSound(),
    getScore: () => score,
    isSoundOn: () => soundOn
  };

  window.addEventListener("keydown", (e) => {
    const k = e.key.toLowerCase();

    if (["arrowup","arrowdown","arrowleft","arrowright"," ","r","m"].includes(k)){
      e.preventDefault();
      e.stopPropagation();
    }

    if (k === "arrowup" || k === "w") window.SavySnake.up();
    else if (k === "arrowdown" || k === "s") window.SavySnake.down();
    else if (k === "arrowleft" || k === "a") window.SavySnake.left();
    else if (k === "arrowright" || k === "d") window.SavySnake.right();
    else if (k === " ") window.SavySnake.pause();
    else if (k === "r") window.SavySnake.restart();
    else if (k === "m") window.SavySnake.sound();
  }, { passive:false });

  function init(){
    resizeCanvasToBox();

    setTimeout(() => {
      booting = false;
      reset();
    }, 1000);

    requestAnimationFrame(() => {
      resizeCanvasToBox();
    });

    requestAnimationFrame(loop);
  }

  if (document.readyState === "loading"){
    window.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>

</body>
</html>
