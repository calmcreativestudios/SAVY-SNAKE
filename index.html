<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Savy Snake Control Overlay</title>

<style>
@font-face{
  font-family:"SavyGameFont";
  src:url("./SFTSchriftedRoundTRIAL-CompBlackIt.ttf") format("truetype");
  font-weight:900;
  font-style:italic;
}

html,body{
  margin:0;
  width:100%;
  height:100%;
  background:transparent;
  overflow:hidden;
}

#phoneWrap{
  position:relative;
  width:100%;
  height:100%;
  background:transparent;
}

#game{
  position:absolute;
  left:16.23%;
  top:26.62%;
  width:66.78%;
  height:20.46%;
  z-index:2;
  background:transparent;
  pointer-events:none;
}

#bootScreen{
  position:absolute;
  left:16.23%;
  top:26.62%;
  width:66.78%;
  height:20.46%;
  z-index:4;
  display:flex;
  align-items:center;
  justify-content:center;
  pointer-events:none;
  opacity:0;
}

#bootLogo{
  width:58%;
  height:auto;
  display:block;
  filter:brightness(0);
}

#bootScreen.play{
  animation:savyBoot 1s steps(2,end) forwards;
}

.zone{
  position:absolute;
  z-index:5;
  background:transparent;
  border:none;
  box-sizing:border-box;
  cursor:pointer;
}

.zone.oval{
  border-radius:999px;
}

.zone.pause{
  clip-path:polygon(
    0% 35%,
    20% 0%,
    52% 22%,
    100% 42%,
    84% 100%,
    42% 70%
  );
}

@keyframes savyBoot{
  0%{opacity:0;}
  20%{opacity:1;}
  70%{opacity:1;}
  85%{opacity:.35;}
  100%{opacity:0; visibility:hidden;}
}
</style>
</head>

<body>

<div id="phoneWrap">
  <canvas id="game"></canvas>

  <div id="bootScreen">
    <img id="bootLogo" src="./SAVYLOGO.svg" alt="SAVY">
  </div>

  <div class="zone pause" data-action="pause"
    style="left:15.39%; top:58.50%; width:19.39%; height:8.61%;"></div>

  <div class="zone oval" data-action="up"
    style="left:38.09%; top:70.97%; width:23.16%; height:5.15%;"></div>

  <div class="zone oval" data-action="sound"
    style="left:68.84%; top:69.91%; width:21.30%; height:4.86%; transform:rotate(-21deg);"></div>

  <div class="zone oval" data-action="left"
    style="left:11.40%; top:77.70%; width:22.10%; height:4.86%; transform:rotate(17deg);"></div>

  <div class="zone oval" data-action="restart"
    style="left:38.09%; top:78.63%; width:23.16%; height:5.15%;"></div>

  <div class="zone oval" data-action="right"
    style="left:67.54%; top:77.70%; width:22.10%; height:4.86%; transform:rotate(-17deg);"></div>

  <div class="zone oval" data-action="down"
    style="left:38.09%; top:86.18%; width:23.16%; height:5.15%;"></div>
</div>

<script>
(() => {
  const COLS = 34;
  const ROWS = 28;

  const START_MS = 90;
  const MIN_MS = 55;
  const SPEEDUP_EVERY = 4;
  const SPEEDUP_MS = 4;

  const EAT_SFX_SRC = "./eat.mp3";
  const START_SFX_SRC = "./START.mp3";
  const LOSE_SFX_SRC = "./LOSE.mp3";
  const BUTTON_SFX_SRC = "./button-click.mp3";

  const eatSfx = new Audio(EAT_SFX_SRC);
  const startSfx = new Audio(START_SFX_SRC);
  const loseSfx = new Audio(LOSE_SFX_SRC);
  const buttonSfx = new Audio(BUTTON_SFX_SRC);

  [eatSfx,startSfx,loseSfx,buttonSfx].forEach(a => {
    a.preload = "auto";
    a.volume = 0.5;
  });

  let soundOn = true;
  let audioArmed = false;

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d", { alpha:true });
  const bootScreen = document.getElementById("bootScreen");

  let snake = [];
  let dir = {x:1,y:0};
  let nextDir = {x:1,y:0};
  let food = {x:10,y:10};
  let score = 0;

  let tickMs = START_MS;
  let lastTime = 0;
  let acc = 0;
  let running = false;
  let paused = false;
  let dead = false;
  let booting = true;

  function armAudioOnce(){
    if(audioArmed) return;
    audioArmed = true;

    try{
      buttonSfx.muted = true;
      const p = buttonSfx.play();

      if(p && typeof p.then === "function"){
        p.then(() => {
          buttonSfx.pause();
          buttonSfx.currentTime = 0;
          buttonSfx.muted = false;
        }).catch(() => {
          buttonSfx.muted = false;
        });
      }
    }catch(e){}
  }

  function playSfx(a){
    if(!soundOn) return;
    try{
      a.currentTime = 0;
      const p = a.play();
      if(p && typeof p.catch === "function") p.catch(() => {});
    }catch(e){}
  }

  function resize(){
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(canvas.clientWidth * dpr * 2);
    canvas.height = Math.floor(canvas.clientHeight * dpr * 2);
    ctx.imageSmoothingEnabled = false;
  }

  window.addEventListener("resize", resize);

  function showBootThenStart(){
    booting = true;
    running = false;
    paused = false;
    dead = false;

    bootScreen.classList.remove("play");
    void bootScreen.offsetWidth;
    bootScreen.classList.add("play");

    setTimeout(() => {
      booting = false;
      reset();
    }, 1000);
  }

  function reset(){
    score = 0;
    tickMs = START_MS;
    dead = false;
    paused = false;
    running = true;
    acc = 0;
    lastTime = 0;

    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);

    snake = [
      {x:midX,y:midY},
      {x:midX-1,y:midY},
      {x:midX-2,y:midY},
      {x:midX-3,y:midY}
    ];

    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    food = spawnFood();

    playSfx(startSfx);
  }

  function spawnFood(){
    for(let i=0;i<1200;i++){
      const x = Math.floor(Math.random()*COLS);
      const y = Math.floor(Math.random()*ROWS);
      if(!snake.some(s => s.x===x && s.y===y)) return {x,y};
    }
    return {x:0,y:0};
  }

  function step(){
    if(dead || paused || booting) return;

    dir = nextDir;

    const head = snake[0];
    const nx = head.x + dir.x;
    const ny = head.y + dir.y;

    if(nx<0 || ny<0 || nx>=COLS || ny>=ROWS){
      dead = true;
      running = false;
      playSfx(loseSfx);
      return;
    }

    if(snake.some((s,i) => i!==0 && s.x===nx && s.y===ny)){
      dead = true;
      running = false;
      playSfx(loseSfx);
      return;
    }

    snake.unshift({x:nx,y:ny});

    if(nx===food.x && ny===food.y){
      score++;
      playSfx(eatSfx);

      if(score % SPEEDUP_EVERY === 0){
        tickMs = Math.max(MIN_MS, tickMs - SPEEDUP_MS);
      }

      food = spawnFood();
    } else {
      snake.pop();
    }
  }

  function gameFont(size){
    return `${size}px "SavyGameFont", Arial Black, Arial, sans-serif`;
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(booting) return;

    const marginX = canvas.width * 0.035;
    const marginY = canvas.height * 0.055;

    const playW = canvas.width - marginX * 2;
    const playH = canvas.height - marginY * 2;

    const cellW = playW / COLS;
    const cellH = playH / ROWS;

    ctx.save();
    ctx.translate(marginX, marginY);

    ctx.strokeStyle = "#000";
    ctx.lineWidth = Math.max(8, Math.min(cellW,cellH) * 0.22);
    ctx.strokeRect(0,0,playW,playH);

    ctx.fillStyle = "#000";

    for(const s of snake){
      ctx.fillRect(
        s.x*cellW + cellW*0.08,
        s.y*cellH + cellH*0.08,
        cellW*0.84,
        cellH*0.84
      );
    }

    ctx.fillRect(
      food.x*cellW + cellW*0.25,
      food.y*cellH + cellH*0.25,
      cellW*0.5,
      cellH*0.5
    );

    ctx.restore();

    if(paused && !dead) drawText("PAUSED", .5, .5, .10);

    if(dead){
      drawText("GAME OVER", .5, .42, .105);
      drawText(`SCORE: ${String(score).padStart(2,"0")}`, .5, .55, .065);
      drawText("PRESS RESTART", .5, .68, .04);
    }
  }

  function drawText(text,x,y,size){
    ctx.save();
    ctx.fillStyle = "#000";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.font = gameFont(Math.floor(canvas.width * size));
    ctx.fillText(String(text).toUpperCase(), canvas.width*x, canvas.height*y);
    ctx.restore();
  }

  function loop(t){
    if(!lastTime) lastTime = t;
    const dt = t - lastTime;
    lastTime = t;

    if(running && !dead && !paused){
      acc += dt;
      while(acc >= tickMs){
        step();
        acc -= tickMs;
      }
    }

    draw();
    requestAnimationFrame(loop);
  }

  function setDirection(dx,dy){
    armAudioOnce();
    if(dead || paused || booting) return;
    if(dx === -dir.x && dy === -dir.y) return;
    nextDir = {x:dx,y:dy};
  }

  window.SavySnake = {
    up: () => setDirection(0,-1),
    down: () => setDirection(0,1),
    left: () => setDirection(-1,0),
    right: () => setDirection(1,0),
    pause: () => {
      armAudioOnce();
      if(dead || booting) return;
      paused = !paused;
    },
    restart: () => {
      armAudioOnce();
      showBootThenStart();
    },
    sound: () => {
      armAudioOnce();
      soundOn = !soundOn;
      return soundOn;
    }
  };

  document.querySelectorAll(".zone").forEach(zone => {
    zone.addEventListener("pointerdown", e => {
      e.preventDefault();
      e.stopPropagation();

      const action = zone.dataset.action;

      armAudioOnce();
      playSfx(buttonSfx);

      if(window.SavySnake[action]) window.SavySnake[action]();
    });
  });

  resize();
  showBootThenStart();
  requestAnimationFrame(loop);
})();
</script>

</body>
</html>
